[build]
  command = "npm run build"
  publish = "web"

[build.environment]
  NODE_VERSION = "20"

# Proxy all API requests to the FastAPI backend.
# Replace <BACKEND_URL> with the public URL of your backend service (e.g., https://forensicai.onrender.com)
[[redirects]]
  from = "/api/*"
  to = "https://forensic-ai.onrender.com/api/:splat"
  status = 200
  force = true
